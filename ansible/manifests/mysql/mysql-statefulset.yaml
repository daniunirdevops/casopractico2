apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: mysql
  namespace: wordpress

spec:
  serviceName: mysql

  replicas: 1

  selector:
    matchLabels:
      app: mysql

  template:
    metadata:
      labels:
        app: mysql

    spec:
      containers:

      - name: mysql

        image: mysql:8.4

        ports:
        - containerPort: 3306

        envFrom:
        - secretRef:
            name: mysql-secret

        volumeMounts:
        - name: mysql-storage
          mountPath: /var/lib/mysql

  volumeClaimTemplates:
  - metadata:
      name: mysql-storage

    spec:
      accessModes:
        - ReadWriteOnce

      storageClassName: managed-csi

      resources:
        requests:
          storage: 10Gi